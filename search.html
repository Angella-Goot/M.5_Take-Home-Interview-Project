<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Zombiez Zombiez Zombiez</title>
    <link rel="stylesheet" href="styles.css">
    <script src="search.js" defer></script>
</head>
<body>
    <header id="search__header">
        <div class="search__nav">
            <div class="navbar">
                <img src="./assests/zombiez_logo.svg" alt="logo" class="logo">
                <ul class="nav__link--list">
                    <li class="nav__link"> 
                        <a href="./index.html">Home</a>
                    </li>
                    <li class="nav__link"> 
                        <a href="#">Contact</a>
                    </li>
                </ul>
            </div>
            <div class="search__wrapper">
                <h1 class="search__header">Browse Films</h1>
                <div class="header__input">
                    <input type="text" placeholder="Search by name or year" class="search__input">
                    <button class="search__btn not-loading">Search</button>
                </div>
            </div>
        </div>
    </header>
    <main>
        <div class="container">
            <div class="row">
                <div class="filter__wrapper">
                    <select id="filter" onchange="sortMovies(event)">
                        <option value="" disabled selected>Filter Results</option>
                        <option value="A_TO_Z">Sort A to Z</option>
                        <option value="Z_TO_A">Sort Z to A</option>
                        <option value="NEW_TO_OLD">New to Old</option>
                        <option value="OLD_TO_NEW">Old to New</option>
                    </select>
                </div>
                <div class="results">
                    <div class="result">
                        <div class="result__container">
                            <img src="" alt="Poster" class="poster__img">
                            <p class="movie__title">Movie Title</p>
                            <p class="movie__date">Movie Date</p>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </main>
    <footer>
        <img src="./assests/zombiez_logo.svg" alt="logo" class="footer__logo">
        <p class="footer__copyright">Copyright © 2026</p>
    </footer>
</body>
</html>
